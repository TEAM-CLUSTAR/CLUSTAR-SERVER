spring:
  application:
    name: cluSTAR

  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:test;MODE=PostgreSQL
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            redirect-uri: http://localhost/login/oauth2/code/google
            authorization-grant-type: authorization_code
            scope:
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    model:
      embedding:
        text: google-genai

    vectorstore:
      type: none

    google:
      genai:
        api-key: test-google-ai-api-key

        chat:
          options:
            model: gemini-3-flash-preview
            temperature: 0.7
            candidate-count: 1

        embedding:
          api-key: test-google-ai-api-key
          text:
            options:
              model: text-embedding-004

jwt:
  secret-key: test-secret-key-test-secret-key-test-secret-key
  expire-length: 3600000 # 60분
  refresh-expire-length: 3600000 # 1시간
  header: Authorization

app:
  cookie:
    domain: ".clustar.cloud"
    same-site: None
    secure: true

cloud:
  aws:
    s3:
      bucket: test-bucket
