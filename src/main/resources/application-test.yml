spring:
  application:
    name: cluSTAR

  config:
    activate:
      on-profile: test  # 테스트

  datasource:
    url: ${TEST_DB_URL}
    username: ${TEST_DB_USERNAME}
    password: ${TEST_DB_PASSWORD}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false

  h2:
    console:
      enabled: false

  web:
    resources:
      add-mappings: false