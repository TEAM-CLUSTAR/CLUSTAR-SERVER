spring:
  application:
    name: cluSTAR

  config:
    activate:
      on-profile: dev  # 개발

  datasource:
    url: ${DEV_DB_URL}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  web:
    resources:
      add-mappings: false

management:
  endpoint:
    health:
      show-details: always # 헬스 체크 상세 내용을 로그로 보기 위해
  health:
    redis:
      enabled: false # Redis가 없어도 전체 앱은 UP 상태로 유지