name: develop-cd
on:
  pull_request:
    types: [closed]
    branches: [develop]
    paths:
      - 'src/**'
      - 'build.gradle'

jobs:
  # 빌드 및 ECR 이미지 푸시
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    # 이 Job에서 만든 값을 다른 Job에서 쓸 수 있도록 설정
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"

      # ECR 로그인을 위한 자격증명 설정
      - name: AWS Credentials 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 태그 설정
        id: set-tag
        run: |
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "🔥 이미지 태그: ${{ github.sha }}"

      - name: Jib로 빌드 및 ECR 푸시
        run: |
          ./gradlew jib \
            -PjibToImage=${{ secrets.ECR_REPOSITORY }} \
            -PjibTag=${{ steps.set-tag.outputs.tag }}
          
          echo "✅ 이미지 푸시 완료: ${{ secrets.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: EC2에 접속 및 배포 명령 실행
        uses: appleboy/ssh-action@v1.0.3
        # Runner의 메모리에 깃 시크릿 값을 잠시 담아둠
        env:
          DEV_DB_URL: ${{ secrets.DEV_DB_URL }}
          DEV_DB_USERNAME: ${{ secrets.DEV_DB_USERNAME }}
          DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          AWS_REGION: ap-northeast-2
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          SWAGGER_USERNAME: ${{ secrets.SWAGGER_USERNAME }}
          SWAGGER_PASSWORD: ${{ secrets.SWAGGER_PASSWORD }}
        with:
          host: ${{ secrets.EC2_DEV_HOST }}
          username: ${{ secrets.EC2_DEV_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # GitHub의 시크릿 값들을 EC2 쉘 환경변수로 넘겨주기 (러너 메모리 -> EC2로 복사)
          envs: DEV_DB_URL,DEV_DB_USERNAME,DEV_DB_PASSWORD,ECR_REPOSITORY,IMAGE_TAG,AWS_REGION,JWT_SECRET_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,GOOGLE_AI_API_KEY,SWAGGER_USERNAME,SWAGGER_PASSWORD
          script: |
            cd /home/ubuntu/clustar_infra
            
            aws ecr get-login-password --region ${AWS_REGION} | \
            sudo docker login --username AWS --password-stdin ${ECR_REPOSITORY%%/*}
            
            echo "DEV_DB_URL=${DEV_DB_URL}" > .env
            echo "DEV_DB_USERNAME=${DEV_DB_USERNAME}" >> .env
            echo "DEV_DB_PASSWORD=${DEV_DB_PASSWORD}" >> .env
            echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> .env
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            echo "JWT_SECRET_KEY=${JWT_SECRET_KEY}" >> .env
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" >> .env
            echo "GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}" >> .env
            echo "GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}" >> .env
            echo "GOOGLE_AI_API_KEY=${SWAGGER_USERNAME}" >> .env
            echo "GOOGLE_AI_API_KEY=${SWAGGER_PASSWORD}" >> .env
            
            # 배포 스크립트 실행권한 부여
            sudo chmod +x deploy.sh
            
            # 현재 환경변수 유지하며 스크립트 실행
            sudo -E ./deploy.sh

      - name: 배포실패 시 이전 버전으로 롤백
        if: failure()

        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_DEV_HOST }}
          username: ${{ secrets.EC2_DEV_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/clustar_infra
            
            echo "🔄 이전 버전으로 롤백 시작"
            
            sudo chmod +x rollback.sh
            sudo ./rollback.sh
            
            echo "✅ 롤백 완료"

  notify-discord:
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
       - name: 배포 결과 디스코드 알림 전송
         env:
           DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
           STATUS: ${{ needs.deploy.result }}
           COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
           AUTHOR: ${{ github.actor }}
           IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
         run: |
           if [ "$STATUS" = "success" ]; then
             message="✅ 배포 성공"
             color=3066993
           else
             message="❌ 배포 실패 (자동 롤백 완료)"
             color=15158332
           fi

           payload=$(cat <<EOF
           {
             "embeds": [{
               "title": "🚀 DEV 서버 배포 알림",
               "description": "**커밋 메시지**: $COMMIT_MESSAGE\n**작성자**: $AUTHOR\n**결과**: ${message}",
               "color": ${color},
               "fields": [
                 {
                   "name": "🏷️ 이미지 태그",
                   "value": "\`$IMAGE_TAG\`",
                   "inline": true
                 },
                 {
                   "name": "🌿 브랜치",
                   "value": "develop",
                   "inline": true
                 },
                 {
                   "name": "🔗 커밋 링크",
                   "value": "[확인하기](https://github.com/${{ github.repository }}/commit/$IMAGE_TAG)"
                 }
               ],
               "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
             }]
           }
           EOF
           )

           curl -H "Content-Type: application/json" \
              -X POST \
              -d "$payload" \
              "$DISCORD_WEBHOOK"

           echo "📢 디스코드 알림 전송 완료"
