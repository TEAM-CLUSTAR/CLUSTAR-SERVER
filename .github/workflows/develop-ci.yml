name: develop-ci
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop]
    paths:
      - 'src/**'
      - 'build.gradle'

permissions:
  contents: read
  pull-requests: write
  checks: write


jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_DB_URL: jdbc:h2:mem:testdb;MODE=PostgreSQL
      TEST_DB_USERNAME: sa
      TEST_DB_PASSWORD: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper

          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with Gradle
        run: ./gradlew clean build -Dspring.profiles.active=test

      - name: Jacoco 커버리지 리포트 생성
        run: ./gradlew jacocoTestReport

      - name: Jacoco 커버리지 PR에 표시
        id: jacoco
        uses: madrapps/jacoco-report@v1.6.1
        with:
          title: 📊테스트 커버리지 리포트
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: 커버리지 정보 출력
        run: |
          echo "📈 전체 커버리지: ${{ steps.jacoco.outputs.coverage-overall }}%"
          echo "📝 변경 파일 커버리지: ${{ steps.jacoco.outputs.coverage-changed-files }}%"

      - name: 테스트 결과 PR에 표시
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'
          comment_title: 🔥테스트 결과

      - name: 테스트 실패 시 코드에 표시
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: 테스트 상세 결과

  notify-discord:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 디스코드로 알림 전송
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ needs.test.result }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.actor }}
        run: |
          if [ "$STATUS" = "success" ]; then
            message="✅ CI 테스트 통과"
            color=3066993
          elif [ "$STATUS" = "skipped" ]; then
            message="⏭️ CI 스킵됨"
            color=8359053
          else
            message="❌ CI 테스트 실패"
            color=15158332
          fi
          
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "🏗️ DEV-CI 알림",
              "description": "**PR #${PR_NUMBER}**: ${PR_TITLE}\n**작성자**: ${AUTHOR}\n**결과**: ${message}",
              "color": ${color},
              "fields": [{
                "name": "🔗 PR 링크",
                "value": "[확인하기](https://github.com/${{ github.repository }}/pull/${PR_NUMBER})"
              }],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$payload" \
               "$DISCORD_WEBHOOK"